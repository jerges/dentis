x-logging: &awslogs
  driver: awslogs
  options:
    awslogs-region: "${AWS_REGION:-us-east-1}"
    awslogs-create-group: "true"

services:
  web:
    image: ${WEB_IMAGE:-dentis-dev-web:latest}
    container_name: dentis-web
    restart: unless-stopped
    pull_policy: missing
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${WEB_HOST_PORT:-8081}:80"
    environment:
      APP_PORT: "${APP_PORT:-8080}"
      NGINX_APP_HOST: "app"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/web"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  app:
    image: ${APP_IMAGE:-dentis-dev-backend:latest}
    container_name: dentis-app
    restart: unless-stopped
    pull_policy: missing
    depends_on:
      postgres:
        condition: service_healthy
      liquibase:
        condition: service_completed_successfully
    ports:
      - "${APP_HOST_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: "dev"
      SERVER_PORT: "8080"
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-dentis_db}"
      DB_USER: "${DB_USER:-dentis}"
      DB_PASSWORD: "${DB_PASSWORD:-dentis}"
      MAIL_HOST: "${MAIL_HOST:-mailhog}"
      MAIL_PORT: "${MAIL_PORT:-1025}"
      MAIL_USERNAME: "${MAIL_USERNAME:-}"
      MAIL_PASSWORD: "${MAIL_PASSWORD:-}"
      JWT_SECRET: "${JWT_SECRET:-dentis-jwt-secret-key-minimum-256-bits-long-for-hs256}"
      JWT_EXPIRATION_MS: "86400000"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      S3_ATTACHMENTS_BUCKET: "${S3_ATTACHMENTS_BUCKET:-}"
      IA_ENABLED: "${IA_ENABLED:-true}"
      IA_GEN_MODEL: "${IA_GEN_MODEL:-us.amazon.nova-pro-v1:0}"
      IA_EMBED_MODEL: "${IA_EMBED_MODEL:-amazon.titan-embed-text-v2:0}"
      IA_MIN_SCORE: "${IA_MIN_SCORE:-0.72}"
      IA_CHUNK_SIZE: "${IA_CHUNK_SIZE:-800}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 45s
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/app"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  liquibase:
    image: liquibase/liquibase:4.24
    container_name: dentis-liquibase
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=db/changelog/db.changelog-master.yaml
      - --url=jdbc:postgresql://postgres:5432/${DB_NAME:-dentis_db}
      - --username=${DB_USER:-dentis}
      - --password=${DB_PASSWORD:-dentis}
      - update
    volumes:
      - ./dentis-api/src/main/resources:/liquibase/changelog:ro
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/liquibase"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: dentis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${DB_NAME:-dentis_db}"
      POSTGRES_USER: "${DB_USER:-dentis}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-dentis}"
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - dentis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dentis} -d ${DB_NAME:-dentis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/postgres"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dentis-mailhog
    restart: unless-stopped
    ports:
      - "${MAIL_SMTP_HOST_PORT:-1025}:1025"
      - "${MAIL_UI_HOST_PORT:-8025}:8025"
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/mailhog"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  landing:
    image: nginx:1.27-alpine
    container_name: dentis-landing
    restart: unless-stopped
    ports:
      - "${LANDING_HOST_PORT:-80}:80"
    volumes:
      - /opt/dentis/landing:/usr/share/nginx/html:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      <<: *awslogs
      options:
        awslogs-region: "${AWS_REGION:-us-east-1}"
        awslogs-group: "/dentis/dev/landing"
        awslogs-create-group: "true"
    networks:
      - dentis-network

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: dentis-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dentis-prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --web.console.libraries=/usr/share/prometheus/console_libraries
      - --web.console.templates=/usr/share/prometheus/consoles
    networks:
      - dentis-network

  grafana:
    image: grafana/grafana:10.4.3
    container_name: dentis-grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-dentis2026}"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - dentis-grafana-data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - dentis-network

volumes:
  dentis-pgdata:
  dentis-prometheus-data:
  dentis-grafana-data:

networks:
  dentis-network:
    driver: bridge

