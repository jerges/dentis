spring:
  application:
    name: dentis
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dentis_db}
    username: ${DB_USER:dentis}
    password: ${DB_PASSWORD:dentis}
    driver-class-name: org.postgresql.Driver
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  ai:
    bedrock:
      aws:
        region: ${AWS_REGION:us-east-1}
      converse:
        chat:
          enabled: true
          options:
            model: ${IA_GEN_MODEL:us.amazon.nova-pro-v1:0}
            max-tokens: ${IA_MAX_TOKENS:1024}
    vectorstore:
      pgvector:
        initialize-schema: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1024
        table-name: ia_documents

server:
  port: 8080
  servlet:
    context-path: /

dentis:
  security:
    jwt:
      secret: ${JWT_SECRET:dentis-jwt-secret-key-minimum-256-bits-long-for-hs256}
      expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  s3:
    bucket: ${S3_ATTACHMENTS_BUCKET:}
  ia:
    enabled: ${IA_ENABLED:true}
    generation-model-id: ${IA_GEN_MODEL:us.amazon.nova-pro-v1:0}
    embedding-model-id: ${IA_EMBED_MODEL:amazon.titan-embed-text-v2:0}
    embedding-dimensions: 1024
    top-k: ${IA_TOPK:5}
    max-tokens: ${IA_MAX_TOKENS:1024}
    min-score: ${IA_MIN_SCORE:0.72}
    chunk-size: ${IA_CHUNK_SIZE:800}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: dentis

logging:
  level:
    com.adakadavra.dentis: INFO
    org.hibernate.SQL: WARN
