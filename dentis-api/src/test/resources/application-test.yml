spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: false
  liquibase:
    enabled: false
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

dentis:
  security:
    jwt:
      secret: test-jwt-secret-key-minimum-256-bits-long-for-hs256-algorithm
      expiration-ms: 86400000

logging:
  level:
    com.adakadavra.dentis: DEBUG
    org.hibernate.SQL: DEBUG

