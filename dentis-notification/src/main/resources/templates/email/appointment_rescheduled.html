<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Cita Reprogramada — Dentis</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .container { max-width:600px; margin:40px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .header { background:#1976d2; color:#fff; padding:32px 24px; text-align:center; }
    .header h1 { margin:0; font-size:24px; }
    .body { padding:32px 24px; color:#333; }
    .body p { line-height:1.6; }
    .detail-box { background:#f0f7ff; border-left:4px solid #1976d2; padding:16px 20px; border-radius:4px; margin:20px 0; }
    .detail-box p { margin:4px 0; }
    .footer { text-align:center; color:#999; font-size:12px; padding:20px; border-top:1px solid #eee; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦷 Dentis</h1>
    <p style="margin:8px 0 0">Tu cita ha sido reprogramada</p>
  </div>
  <div class="body">
    <p>Hola, <strong th:text="${recipientName}">Paciente</strong>.</p>
    <p>Tu cita dental ha sido reprogramada. La nueva fecha es:</p>
    <div class="detail-box">
      <p><strong>Nueva fecha y hora:</strong> <span th:text="${appointmentDate}">—</span></p>
    </div>
    <p>Si tienes alguna pregunta, por favor contáctanos.</p>
    <p>¡Hasta pronto!</p>
  </div>
  <div class="footer">Dentis — Sistema de Gestión Dental · Este mensaje es automático, no responder.</div>
</div>
</body>
</html>
