<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>Pago Recibido — Dentis</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f5f5f5; margin:0; padding:0; }
    .container { max-width:600px; margin:40px auto; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 2px 8px rgba(0,0,0,.1); }
    .header { background:#512da8; color:#fff; padding:32px 24px; text-align:center; }
    .header h1 { margin:0; font-size:24px; }
    .body { padding:32px 24px; color:#333; }
    .body p { line-height:1.6; }
    .detail-box { background:#f5f0ff; border-left:4px solid #512da8; padding:16px 20px; border-radius:4px; margin:20px 0; }
    .detail-box p { margin:4px 0; }
    .footer { text-align:center; color:#999; font-size:12px; padding:20px; border-top:1px solid #eee; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🦷 Dentis</h1>
    <p style="margin:8px 0 0">Pago recibido exitosamente</p>
  </div>
  <div class="body">
    <p>Hola, <strong th:text="${recipientName}">Paciente</strong>.</p>
    <p>Hemos recibido tu pago correctamente.</p>
    <div class="detail-box" th:if="${amount != null}">
      <p><strong>Monto:</strong> <span th:text="${amount}">—</span></p>
      <p th:if="${paymentMethod != null}"><strong>Método:</strong> <span th:text="${paymentMethod}">—</span></p>
      <p th:if="${invoiceReference != null}"><strong>Nº de factura:</strong> <span th:text="${invoiceReference}">—</span></p>
    </div>
    <p>Gracias por tu confianza en nuestros servicios.</p>
  </div>
  <div class="footer">Dentis — Sistema de Gestión Dental · Este mensaje es automático, no responder.</div>
</div>
</body>
</html>
