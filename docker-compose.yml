services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: dentis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-dentis_db}
      POSTGRES_USER: ${DB_USER:-dentis}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dentis}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - dentis-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dentis} -d ${DB_NAME:-dentis_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase:4.24
    container_name: dentis-liquibase
    profiles:
      - dev
    depends_on:
      postgres:
        condition: service_healthy
    command:
      - --search-path=/liquibase/changelog
      - --changelog-file=db/changelog/db.changelog-master.yaml
      - --url=jdbc:postgresql://postgres:5432/${DB_NAME:-dentis_db}
      - --username=${DB_USER:-dentis}
      - --password=${DB_PASSWORD:-dentis}
      - update
    volumes:
      - ./dentis-api/src/main/resources:/liquibase/changelog:ro

  mailhog:
    image: mailhog/mailhog:latest
    container_name: dentis-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    profiles:
      - dev

  prometheus:
    image: prom/prometheus:latest
    container_name: dentis-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - dentis-prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
    profiles:
      - dev

  grafana:
    image: grafana/grafana-oss:latest
    container_name: dentis-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - dentis-grafana-data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    profiles:
      - dev

volumes:
  dentis-pgdata:
  dentis-prometheus-data:
  dentis-grafana-data:
